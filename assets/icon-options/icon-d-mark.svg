<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgD" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0" stop-color="#c2705f"/>
      <stop offset="1" stop-color="#9e4537"/>
    </linearGradient>
    <filter id="glyphD" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#5a1f16" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- terracotta squircle -->
  <rect x="100" y="100" width="824" height="824" rx="185" fill="url(#bgD)"/>
  <!-- top sheen -->
  <rect x="100" y="100" width="824" height="412" rx="185" fill="#ffffff" opacity="0.06"/>
  <rect x="100" y="100" width="824" height="824" rx="185" fill="none" stroke="#7e3327" stroke-width="3"/>

  <!-- two white panels with a gap (◧◨) -->
  <g filter="url(#glyphD)">
    <rect x="270" y="300" width="200" height="424" rx="30" fill="#ffffff"/>
    <rect x="554" y="300" width="200" height="424" rx="30" fill="#fbeee9"/>
  </g>

  <!-- left panel lines -->
  <rect x="306" y="356" width="128" height="22" rx="11" fill="#d8b3aa"/>
  <rect x="306" y="420" width="96" height="22" rx="11" fill="#e3cfc8"/>
  <rect x="306" y="484" width="118" height="22" rx="11" fill="#e3cfc8"/>
  <rect x="306" y="548" width="80" height="22" rx="11" fill="#e3cfc8"/>
  <!-- right panel lines -->
  <rect x="590" y="356" width="128" height="22" rx="11" fill="#a9d2b8"/>
  <rect x="590" y="420" width="96" height="22" rx="11" fill="#cfe3d6"/>
  <rect x="590" y="484" width="118" height="22" rx="11" fill="#cfe3d6"/>
  <rect x="590" y="612" width="100" height="22" rx="11" fill="#a9d2b8"/>
</svg>
